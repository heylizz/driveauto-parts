<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun — DriveAuto Parts</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap nav">
    <a href="index.html" class="brand">
      <i class="bi bi-nut"></i>
      <span>Drive<span class="dot">Auto</span><br><small>SPAREPART STORE</small></span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="produk.html">Produk</a>
      <a href="tentang.html">Tentang Kami</a>
      <a href="kontak.html">Kontak</a>
      <a href="faq.html">FAQ</a>
    </nav>
    <div class="nav-actions">
      <a href="keranjang.html" class="icon-btn" aria-label="Keranjang">
        <i class="bi bi-cart3"></i>
        <span class="cart-count" data-cart-count>0</span>
      </a>
      <span data-auth-slot></span>
      <button class="nav-toggle" aria-label="Menu"><i class="bi bi-list"></i></button>
    </div>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card" style="max-width:440px;">
    <h1>Daftar Akun</h1>
    <p>Buat akun untuk mulai memesan sparepart di DriveAuto Parts.</p>

    <form id="register-form" novalidate>
      <div class="field" style="margin-bottom:14px;">
        <label for="r-name">Nama Lengkap</label>
        <input type="text" id="r-name" placeholder="Nama Anda">
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label for="r-email">Email</label>
        <input type="email" id="r-email" placeholder="nama@email.com">
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label for="r-phone">Nomor Telepon</label>
        <input type="tel" id="r-phone" placeholder="08xxxxxxxxxx">
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label for="r-password">Kata Sandi</label>
        <input type="password" id="r-password" placeholder="Minimal 6 karakter">
      </div>
      <p class="error" id="register-error" style="margin-bottom:10px;"></p>
      <button type="submit" class="btn btn-primary btn-block"></i> Daftar</button>
    </form>

    <p class="auth-foot">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
  </div>
</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/main.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('r-name').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const phone = document.getElementById('r-phone').value.trim();
    const password = document.getElementById('r-password').value;
    const errEl = document.getElementById('register-error');

    if(!name || !email || !phone || !password){
      errEl.textContent = 'Semua kolom wajib diisi.'; return;
    }
    if(password.length < 6){
      errEl.textContent = 'Kata sandi minimal 6 karakter.'; return;
    }
    const result = Store.registerUser({ name, email, phone, password });
    if(!result.ok){ errEl.textContent = result.message; return; }
    errEl.textContent = '';
    Store.login(email, password);
    window.location.href = 'akun.html';
  });
</script>
</body>
</html>
