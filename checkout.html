<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — DriveAuto Parts</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap nav">
    <a href="index.html" class="brand">
      <i class="bi bi-nut"></i>
      <span>Drive<span class="dot">Auto</span><br><small>SPAREPART STORE</small></span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="produk.html">Produk</a>
      <a href="tentang.html">Tentang Kami</a>
      <a href="kontak.html">Kontak</a>
      <a href="faq.html">FAQ</a>
    </nav>
    <div class="nav-actions">
      <a href="keranjang.html" class="icon-btn" aria-label="Keranjang">
        <i class="bi bi-cart3"></i>
        <span class="cart-count" data-cart-count>0</span>
      </a>
      <span data-auth-slot></span>
      <button class="nav-toggle" aria-label="Menu"><i class="bi bi-list"></i></button>
    </div>
  </div>
</header>

<section class="page-banner">
  <div class="wrap">
    <div class="breadcrumb">Beranda / Keranjang / <span>Checkout</span></div>
    <h1>Checkout</h1>
  </div>
</section>

<section class="section">
  <div class="wrap" id="checkout-wrap">
    <div class="steps">
      <div class="step active"><span class="n">1</span> Data Pemesan</div>
      <div class="step-sep"></div>
      <div class="step active"><span class="n">2</span> Pembayaran</div>
      <div class="step-sep"></div>
      <div class="step"><span class="n">3</span> Selesai</div>
    </div>

    <div class="grid-2" style="grid-template-columns:1.4fr 1fr;align-items:flex-start;">
      <div>
        <div class="form-card" style="margin-bottom:20px;">
          <h3 style="margin-bottom:16px;"><i class="bi bi-person"></i> Data Pemesan</h3>
          <div class="form-row">
            <div class="field"><label>Nama</label><input type="text" id="co-name" readonly></div>
            <div class="field"><label>Telepon</label><input type="text" id="co-phone" readonly></div>
          </div>
          <div class="field full">
            <label for="co-note">Catatan (opsional)</label>
            <textarea id="co-note" placeholder="Contoh: ambil sore hari, atau minta dipasang di toko"></textarea>
          </div>
        </div>

        <div class="form-card">
          <h3 style="margin-bottom:16px;"><i class="bi bi-credit-card"></i> Metode Pembayaran</h3>
          <label class="pay-option"><i class="bi bi-bank"></i> Transfer Bank <input type="radio" name="pay" value="Transfer Bank" checked></label>
          <label class="pay-option"><i class="bi bi-qr-code"></i> QRIS <input type="radio" name="pay" value="QRIS"></label>
          <label class="pay-option"><i class="bi bi-cash-coin"></i> Bayar di Toko <input type="radio" name="pay" value="Bayar di Toko"></label>
        </div>
      </div>

      <div class="cart-summary">
        <h3 style="margin-bottom:16px;">Ringkasan Pesanan</h3>
        <div id="order-lines"></div>
        <div class="summary-row total" id="order-total"></div>
        <button id="place-order" class="btn btn-primary btn-block" style="margin-top:16px;">
          <i class="bi bi-check2-circle"></i> Buat Pesanan</button>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-bottom" style="border-top:none;padding-top:0;">
      <span>© <span id="current-year">2026</span> DriveAuto Parts. All rights reserved.</span>
    </div>
  </div>
</footer>

<script src="assets/js/store.js"></script>
<script src="assets/js/main.js"></script>
<script>
  const user = Store.getSessionUser();
  if(!user){
    window.location.href = 'login.html';
  }else if(Store.cartDetailed().length === 0){
    window.location.href = 'keranjang.html';
  }else{
    document.getElementById('co-name').value = user.name;
    document.getElementById('co-phone').value = user.phone;

    const items = Store.cartDetailed();
    const total = items.reduce((s, i) => s + i.subtotal, 0);
    const linesEl = document.getElementById('order-lines');
    items.forEach(i => {
      linesEl.insertAdjacentHTML('beforeend',
        `<div class="order-line"><span>${i.product.name} × ${i.qty}</span><span>${formatRupiah(i.subtotal)}</span></div>`);
    });
    document.getElementById('order-total').innerHTML = `<span>Total</span><span>${formatRupiah(total)}</span>`;

    document.getElementById('place-order').addEventListener('click', () => {
      const pay = document.querySelector('input[name="pay"]:checked').value;
      const note = document.getElementById('co-note').value.trim();
      const order = {
        id: 'DA-' + Date.now().toString().slice(-8),
        userId: user.id,
        items: items.map(i => ({ productId:i.productId, name:i.product.name, qty:i.qty, price:i.product.price })),
        total,
        payment: pay,
        note,
        status: 'Diproses',
        date: new Date().toISOString()
      };
      Store.createOrder(order);
      Store.clearCart();
      showToast('Pesanan berhasil dibuat', 'bi-check2-circle');
      setTimeout(() => window.location.href = 'akun.html', 900);
    });
  }
</script>
</body>
</html>
