<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang — DriveAuto Parts</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap nav">
    <a href="index.html" class="brand">
      <i class="bi bi-nut"></i>
      <span>Drive<span class="dot">Auto</span><br><small>SPAREPART STORE</small></span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="produk.html">Produk</a>
      <a href="tentang.html">Tentang Kami</a>
      <a href="kontak.html">Kontak</a>
      <a href="faq.html">FAQ</a>
    </nav>
    <div class="nav-actions">
      <a href="keranjang.html" class="icon-btn" aria-label="Keranjang">
        <i class="bi bi-cart3"></i>
        <span class="cart-count" data-cart-count>0</span>
      </a>
      <span data-auth-slot></span>
      <button class="nav-toggle" aria-label="Menu"><i class="bi bi-list"></i></button>
    </div>
  </div>
</header>

<section class="page-banner">
  <div class="wrap">
    <div class="breadcrumb">Beranda / <span>Keranjang</span></div>
    <h1>Keranjang Belanja</h1>
  </div>
</section>

<section class="section">
  <div class="wrap" id="cart-wrap"></div>
</section>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-bottom" style="border-top:none;padding-top:0;">
      <span>© <span id="current-year">2026</span> DriveAuto Parts. All rights reserved.</span>
    </div>
  </div>
</footer>

<script src="assets/js/store.js"></script>
<script src="assets/js/main.js"></script>
<script>
  function renderCart(){
    const items = Store.cartDetailed();
    const wrap = document.getElementById('cart-wrap');

    if(items.length === 0){
      wrap.innerHTML = `
        <div class="empty-cart">
          <i class="bi bi-cart-x"></i>
          <h2 style="font-size:1.2rem;margin-bottom:8px;">Keranjang masih kosong</h2>
          <p style="margin-bottom:20px;">Belum ada produk yang ditambahkan.</p>
          <a href="produk.html" class="btn btn-primary"><i class="bi bi-grid"></i> Lihat Produk</a>
        </div>`;
      return;
    }

    const total = items.reduce((s, i) => s + i.subtotal, 0);

    wrap.innerHTML = `
      <div class="grid-2" style="grid-template-columns:2fr 1fr;align-items:flex-start;">
        <div class="table-wrap">
          <table class="cart-table">
            <thead><tr><th>Produk</th><th>Harga</th><th>Jumlah</th><th>Subtotal</th><th></th></tr></thead>
            <tbody id="cart-body"></tbody>
          </table>
        </div>
        <div class="cart-summary">
          <h3 style="margin-bottom:16px;">Ringkasan</h3>
          <div class="summary-row"><span>Subtotal</span><span>${formatRupiah(total)}</span></div>
          <div class="summary-row"><span>Ongkos Kirim</span><span>Ambil di toko</span></div>
          <div class="summary-row total"><span>Total</span><span>${formatRupiah(total)}</span></div>
          <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:16px;">
            <i class="bi bi-bag-check"></i> Lanjut ke Checkout</a>
        </div>
      </div>`;

    const body = document.getElementById('cart-body');
    items.forEach(item => {
      body.insertAdjacentHTML('beforeend', `
        <tr data-row="${item.productId}">
          <td>
            <div class="cart-item">
              <img src="${item.product.img}" alt="${item.product.name}">
              <div>
                <div class="nm">${item.product.name}</div>
                <div class="cd">#${item.product.code}</div>
              </div>
            </div>
          </td>
          <td>${formatRupiah(item.product.price)}</td>
          <td>
            <div class="qty-box">
              <button data-qty-down="${item.productId}">−</button>
              <span>${item.qty}</span>
              <button data-qty-up="${item.productId}">+</button>
            </div>
          </td>
          <td class="price">${formatRupiah(item.subtotal)}</td>
          <td><button class="remove-btn" data-remove="${item.productId}"><i class="bi bi-trash3"></i></button></td>
        </tr>`);
    });

    body.querySelectorAll('[data-qty-up]').forEach(b => b.addEventListener('click', () => {
      const id = b.getAttribute('data-qty-up');
      const line = Store.getCart().find(c => c.productId === id);
      Store.updateCartQty(id, line.qty + 1);
      renderCart(); refreshNavState();
    }));
    body.querySelectorAll('[data-qty-down]').forEach(b => b.addEventListener('click', () => {
      const id = b.getAttribute('data-qty-down');
      const line = Store.getCart().find(c => c.productId === id);
      Store.updateCartQty(id, line.qty - 1);
      renderCart(); refreshNavState();
    }));
    body.querySelectorAll('[data-remove]').forEach(b => b.addEventListener('click', () => {
      Store.removeFromCart(b.getAttribute('data-remove'));
      renderCart(); refreshNavState();
      showToast('Produk dihapus dari keranjang', 'bi-trash3');
    }));
  }
  renderCart();
</script>
</body>
</html>
