<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — DriveAuto Parts</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap nav">
    <a href="index.html" class="brand">
      <i class="bi bi-nut"></i>
      <span>Drive<span class="dot">Auto</span><br><small>SPAREPART STORE</small></span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="produk.html">Produk</a>
      <a href="tentang.html">Tentang Kami</a>
      <a href="kontak.html">Kontak</a>
      <a href="faq.html">FAQ</a>
    </nav>
    <div class="nav-actions">
      <a href="keranjang.html" class="icon-btn" aria-label="Keranjang">
        <i class="bi bi-cart3"></i>
        <span class="cart-count" data-cart-count>0</span>
      </a>
      <span data-auth-slot></span>
      <button class="nav-toggle" aria-label="Menu"><i class="bi bi-list"></i></button>
    </div>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">

    <h1>Masuk</h1>
    <p>Masuk untuk memesan sparepart dan melihat riwayat pesanan.</p>

    <form id="login-form" novalidate>
      <div class="field" style="margin-bottom:16px;">
        <label for="l-email">Email</label>
        <input type="email" id="l-email" placeholder="nama@email.com">
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label for="l-password">Kata Sandi</label>
        <input type="password" id="l-password" placeholder="Kata sandi">
      </div>
      <p class="error" id="login-error" style="margin-bottom:10px;"></p>
      <button type="submit" class="btn btn-primary btn-block"></i> Masuk</button>
    </form>

    <p class="auth-foot">Belum punya akun? <a href="register.html">Daftar di sini</a></p>


  </div>
</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/main.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('l-email').value.trim();
    const password = document.getElementById('l-password').value;
    const result = Store.login(email, password);
    const errEl = document.getElementById('login-error');
    if(!result.ok){ errEl.textContent = result.message; return; }
    errEl.textContent = '';
    window.location.href = result.user.role === 'admin' ? 'admin.html' : 'akun.html';
  });
</script>
</body>
</html>
